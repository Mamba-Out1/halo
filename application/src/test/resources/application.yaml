server:
  port: 8090
spring:
  output:
    ansi:
      enabled: detect
  r2dbc:
    # 支持通过环境变量覆盖数据库配置（用于 CI 环境）
    url: ${SPRING_R2DBC_URL:r2dbc:h2:mem:///halo-test?options=DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_R2DBC_USERNAME:sa}
    password: ${SPRING_R2DBC_PASSWORD:}
    name: halo-test
  sql:
    init:
      mode: always
      platform: ${SPRING_SQL_INIT_PLATFORM:h2}
  messages:
    basename: config.i18n.messages

halo:
  work-dir: ${user.home}/halo-next-test
  external-url: "http://${server.address:localhost}:${server.port}"
  security:
    initializer:
      disabled: true
    oauth2:
      jwt:
        public-key-location: classpath:app.pub
        private-key-location: classpath:app.key
  extension:
    controller:
      disabled: true
  search-engine:
    lucene:
      enabled: false

springdoc:
  api-docs:
    enabled: false
logging:
  level:
    run.halo.app: debug
    org.springframework.r2dbc: DEBUG
